global:
  host: "localhost"
  enableTLS: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 15m

api:
  replicas: 1
  persistence:
    persistentVolumeClaim:
      storageClass: "nfs"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

pluginDaemon:
  persistence:
    persistentVolumeClaim:
      storageClass: "nfs"

worker:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
